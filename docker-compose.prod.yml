services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    env_file: .env.prod
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - vps_shared_network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    env_file: .env.prod
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "${LOCAL_LLM_MODEL:-gemma3:4b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - vps_shared_network
    restart: "no"

  backend:
    build: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    env_file: .env.prod
    environment:
      # Dentro del contenedor, localhost no llega al host; se usa host.docker.internal
      - POSTGRES_HOST=${POSTGRES_HOST:-host.docker.internal}
      # Puerto del túnel SSH que expone la DB externa en el host
      - POSTGRES_PORT=${POSTGRES_PORT:-5433}
    # Permite al contenedor alcanzar servicios del host (PostgreSQL, n8n, WPPConnect)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - vps_shared_network
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"
    env_file: .env.prod
    depends_on:
      - backend
    networks:
      - vps_shared_network
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  vps_shared_network:
    external: true
