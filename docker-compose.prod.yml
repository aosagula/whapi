services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    env_file: .env
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    env_file: .env
    depends_on:
      ollama:
        condition: service_healthy
    command: ["pull", "${LOCAL_LLM_MODEL:-gemma3:4b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Dentro del contenedor, localhost no llega al host; se usa host.docker.internal
      - POSTGRES_HOST=host.docker.internal
      # Puerto del túnel SSH que expone la DB externa en el host
      - POSTGRES_PORT=5433
    volumes:
      - ./backend:/app
    # Permite al contenedor alcanzar servicios del host (PostgreSQL, n8n, WPPConnect)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
